<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f7fc;
            font-family:Arial, Helvetica, sans-serif;
        }

        /* Navbar */

        .navbar{
            background:linear-gradient(90deg,#0d6efd,#3b82f6);
            box-shadow:0 4px 12px rgba(0,0,0,.15);
        }

        .navbar-brand{
            color:white !important;
            font-size:28px;
            font-weight:bold;
        }

        .nav-link{
            color:white !important;
            margin-left:20px;
            font-weight:500;
            transition:.3s;
        }

        .nav-link:hover{
            color:#ffe082 !important;
        }

        /* Main Container */

        .main-container{
            margin-top:35px;
            margin-bottom:40px;
        }

        /* Cards */

        .card{
            border:none;
            border-radius:18px;
            box-shadow:0 10px 25px rgba(0,0,0,.12);
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-6px);
            box-shadow:0 15px 30px rgba(0,0,0,.18);
        }

        /* Tables */

        .table{
            background:white;
            border-radius:12px;
            overflow:hidden;
        }

        .table thead{
            background:#212529;
            color:white;
        }

        .table td,
        .table th{
            vertical-align:middle;
            text-align:center;
        }

        /* Buttons */

        .btn{
            border-radius:10px;
            transition:.3s;
        }

        .btn:hover{
            transform:scale(1.05);
        }

        /* Footer */

        footer{
            margin-top:60px;
            background:#212529;
            color:white;
            text-align:center;
            padding:18px;
            font-size:15px;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

    <div class="container">

        <a class="navbar-brand" href="{% url 'home' %}">
            🎓 Placement Management
        </a>

        <button class="navbar-toggler bg-light" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'student_list' %}">
                        Students
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'company_list' %}">
                        Companies
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'job_list' %}">
                        Jobs
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'application_list' %}">
                        Applications
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/admin/">
                        Admin
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container main-container">

    {% block content %}

    {% endblock %}

</div>

<footer>

    © 2026 Placement Management System |
    Developed by <b>Pradnya Shinde</b>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
