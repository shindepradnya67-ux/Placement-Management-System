<!DOCTYPE html>
<html>
<head>
    <title>Apply for Job</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3 class="text-center">Job Application Form</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label"><b>Select Student</b></label>
                    {{ form.student }}
                </div>

                <div class="mb-3">
                    <label class="form-label"><b>Select Job</b></label>
                    {{ form.job }}
                </div>

                <button type="submit" class="btn btn-success">
                    Apply Job
                </button>

                <a href="{% url 'application_list' %}" class="btn btn-primary">
                    View Applications
                </a>

                <a href="{% url 'eligible_jobs' %}" class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
